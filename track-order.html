<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>document.documentElement.classList.add('js');</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track your order — Gaurav Design</title>
<meta name="description" content="Check the live status of your Gaurav Design order.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EFEDE2; --paper-alt:#E6E2D3; --ink:#1F2A38; --ink-soft:#4A5563;
    --carbon-red:#B23A2E; --stamp-mustard:#C9922A; --ledger-green:#4C6B54;
    --line:#C9C4B2; --white:#FFFDF8; --mono:'JetBrains Mono', monospace; --sans:'Work Sans', sans-serif;
  }
  [data-theme="dark"]{
    --paper:#171A1E; --paper-alt:#1E2228; --ink:#ECE8DC; --ink-soft:#A9A79B;
    --carbon-red:#E0574A; --stamp-mustard:#E0AC4D; --ledger-green:#7FA98C;
    --line:#3A3E44; --white:#20242A;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--paper); color:var(--ink); font-family:var(--sans); line-height:1.5;}
  a{color:inherit; text-decoration:none;}
  .mono{font-family:var(--mono);}

  header.nav{position:sticky; top:0; z-index:50; background:var(--white); border-bottom:1px solid var(--line);}
  .nav-inner{display:flex; align-items:center; justify-content:space-between; padding:16px 24px; max-width:1080px; margin:0 auto;}
  .back-link{font-family:var(--mono); font-size:.82rem; font-weight:700; color:var(--ink); display:flex; align-items:center; gap:6px;}
  .brand{font-weight:700; font-size:.95rem;}
  .icon-btn{width:36px; height:36px; border-radius:50%; border:1px solid var(--line); background:var(--paper); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:.95rem;}

  .page-head{padding:44px 24px 24px; text-align:center;}
  .page-head .eyebrow{font-family:var(--mono); font-size:.7rem; color:var(--carbon-red); font-weight:700; letter-spacing:.08em; margin-bottom:10px;}
  .page-head h1{font-size:1.6rem; font-weight:700;}
  .page-head p{color:var(--ink-soft); font-size:.9rem; margin-top:8px;}

  .wrap{max-width:560px; margin:0 auto; padding:0 24px 60px;}

  .form-card{background:var(--white); border:1px solid var(--line); padding:28px;}
  .field{margin-bottom:16px;}
  label{display:block; font-size:.76rem; font-weight:700; margin-bottom:6px; font-family:var(--mono); color:var(--ink-soft);}
  input{width:100%; padding:11px 12px; border:1px solid var(--line); background:var(--paper); color:var(--ink); font-family:var(--sans); font-size:.92rem; border-radius:2px;}
  input:focus{outline:2px solid var(--carbon-red); outline-offset:1px;}
  .field-error{display:none; color:var(--carbon-red); font-size:.76rem; font-weight:600; margin-top:5px; font-family:var(--mono);}
  .field.invalid input{border-color:var(--carbon-red); outline:1px solid var(--carbon-red);}
  .field.invalid .field-error{display:block;}

  .btn{display:inline-flex; align-items:center; gap:8px; padding:13px 22px; border-radius:2px; font-weight:700; font-size:.9rem; border:none; cursor:pointer; background:var(--carbon-red); color:#fff; width:100%; justify-content:center; transition:transform .15s;}
  .btn:hover{transform:translateY(-2px);}
  .btn:disabled{opacity:.6; cursor:not-allowed; transform:none;}

  .lookup-error{display:none; background:var(--paper-alt); border:1px solid var(--carbon-red); border-left:4px solid var(--carbon-red); padding:12px 16px; font-size:.85rem; color:var(--ink); margin-top:16px;}

  .result-card{display:none; background:var(--white); border:1px solid var(--line); padding:28px; margin-top:24px;}
  .result-head{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:24px; flex-wrap:wrap; gap:10px;}
  .result-head .oid{font-family:var(--mono); font-weight:700; font-size:1.1rem;}
  .result-head .service{color:var(--ink-soft); font-size:.85rem; margin-top:4px;}
  .pay-badge{font-family:var(--mono); font-size:.7rem; font-weight:700; padding:4px 10px; border-radius:12px;}
  .pay-badge.paid{background:rgba(76,107,84,.15); color:var(--ledger-green);}
  .pay-badge.pending{background:rgba(178,58,46,.12); color:var(--carbon-red);}

  .timeline{display:flex; flex-direction:column; gap:0;}
  .tl-step{display:flex; gap:14px; position:relative; padding-bottom:26px;}
  .tl-step:last-child{padding-bottom:0;}
  .tl-dot{
    width:26px; height:26px; border-radius:50%; flex-shrink:0; z-index:2;
    display:flex; align-items:center; justify-content:center;
    border:2px solid var(--line); background:var(--white); font-size:.7rem; font-weight:800;
  }
  .tl-step.done .tl-dot{background:var(--ledger-green); border-color:var(--ledger-green); color:#fff;}
  .tl-step.current .tl-dot{background:var(--carbon-red); border-color:var(--carbon-red); color:#fff;}
  .tl-step::before{
    content:""; position:absolute; left:12.5px; top:26px; bottom:0; width:2px; background:var(--line); z-index:1;
  }
  .tl-step:last-child::before{display:none;}
  .tl-step.done::before{background:var(--ledger-green);}
  .tl-label{font-weight:700; font-size:.9rem; padding-top:3px;}
  .tl-step.current .tl-label{color:var(--carbon-red);}
  .tl-meta{color:var(--ink-soft); font-size:.78rem; margin-top:16px; font-family:var(--mono);}

  footer{padding:32px 24px; text-align:center; border-top:1px solid var(--line);}
  footer p{color:var(--ink-soft); font-size:.8rem;}
</style>
</head>
<body data-theme="light">

<header class="nav">
  <div class="nav-inner">
    <a href="index.html" class="back-link">← Back to home</a>
    <div class="brand">GAURAV DESIGN</div>
    <button class="icon-btn" id="themeToggle" aria-label="Toggle dark mode">🌙</button>
  </div>
</header>

<div class="page-head">
  <div class="eyebrow">TRACK ORDER</div>
  <h1>Check your order status</h1>
  <p>Enter your Order ID and the phone number you used while ordering.</p>
</div>

<div class="wrap">
  <form class="form-card" id="trackForm">
    <div class="field">
      <label>Order ID</label>
      <input type="text" name="orderNumber" placeholder="e.g. GD-0001" required>
      <span class="field-error" data-error-for="orderNumber"></span>
    </div>
    <div class="field">
      <label>Phone number used at order</label>
      <input type="tel" name="phone" placeholder="10-digit mobile number" maxlength="14" required>
      <span class="field-error" data-error-for="phone"></span>
    </div>
    <button type="submit" class="btn" id="trackBtn">Track order →</button>
    <div class="lookup-error" id="lookupError"></div>
  </form>

  <div class="result-card" id="resultCard">
    <div class="result-head">
      <div>
        <div class="oid mono" id="resOrderId"></div>
        <div class="service" id="resService"></div>
      </div>
      <div class="pay-badge" id="resPayBadge"></div>
    </div>

    <div class="timeline" id="timeline"></div>

    <div class="tl-meta" id="resMeta"></div>
    <div class="tl-meta" id="resCoupon" style="display:none; color:var(--ledger-green);"></div>
  </div>
</div>

<footer>
  <p>Gaurav Design · Burari, Delhi NCR</p>
  <p><a href="index.html">← Back to home</a></p>
</footer>

<script>
  const toggle = document.getElementById('themeToggle');
  const body = document.body;
  try {
    const saved = localStorage.getItem('gd-theme');
    if(saved){ body.setAttribute('data-theme', saved); toggle.textContent = saved === 'dark' ? '☀️' : '🌙'; }
  } catch(e){}
  toggle.addEventListener('click', () => {
    const isDark = body.getAttribute('data-theme') === 'dark';
    const next = isDark ? 'light' : 'dark';
    body.setAttribute('data-theme', next);
    toggle.textContent = isDark ? '🌙' : '☀️';
    try { localStorage.setItem('gd-theme', next); } catch(e){}
  });

  const STAGES = ['Order Placed', 'Order Confirmed', 'Design in Progress', 'Review', 'Order Delivered'];

  const trackForm = document.getElementById('trackForm');
  const trackBtn = document.getElementById('trackBtn');
  const lookupError = document.getElementById('lookupError');
  const resultCard = document.getElementById('resultCard');

  function setError(fieldName, message){
    const input = trackForm.elements[fieldName];
    const wrapper = input.closest('.field');
    const errorEl = wrapper.querySelector('.field-error');
    if(message){ wrapper.classList.add('invalid'); errorEl.textContent = message; }
    else { wrapper.classList.remove('invalid'); errorEl.textContent = ''; }
  }

  function renderTimeline(status){
    const timeline = document.getElementById('timeline');
    timeline.innerHTML = '';
    const currentIndex = STAGES.indexOf(status);
    STAGES.forEach((stage, i) => {
      const step = document.createElement('div');
      step.className = 'tl-step';
      if (i < currentIndex) step.classList.add('done');
      if (i === currentIndex) step.classList.add('current');
      const dotContent = i < currentIndex ? '✓' : (i + 1);
      step.innerHTML = `<div class="tl-dot">${dotContent}</div><div class="tl-label">${stage}</div>`;
      timeline.appendChild(step);
    });
  }

  trackForm.addEventListener('submit', async function(e){
    e.preventDefault();
    let valid = true;
    const orderNumber = trackForm.orderNumber.value.trim();
    const phone = trackForm.phone.value.trim();

    if(!orderNumber){ setError('orderNumber', 'Enter your Order ID'); valid = false; } else setError('orderNumber','');
    if(!/^[6-9]\d{9}$/.test(phone.replace(/^\+91[\s-]?/, ''))){ setError('phone', 'Enter a valid 10-digit mobile number'); valid = false; } else setError('phone','');
    if(!valid) return;

    trackBtn.disabled = true;
    trackBtn.textContent = 'Checking…';
    lookupError.style.display = 'none';
    resultCard.style.display = 'none';

    try {
      const res = await fetch('/api/track-order', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ orderNumber, phone })
      });
      const data = await res.json();

      if (!res.ok || !data.success) {
        lookupError.textContent = data.error || 'No matching order found.';
        lookupError.style.display = 'block';
        return;
      }

      const order = data.order;
      document.getElementById('resOrderId').textContent = order.order_number;
      document.getElementById('resService').textContent = order.service;
      const badge = document.getElementById('resPayBadge');
      badge.textContent = order.payment_status;
      badge.className = 'pay-badge ' + (order.payment_status === 'Paid' ? 'paid' : 'pending');
      renderTimeline(order.status);
      const created = new Date(order.created_at).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
      document.getElementById('resMeta').textContent = `Ordered on ${created}` + (order.deadline ? ` · Deadline: ${order.deadline}` : '');

      const couponEl = document.getElementById('resCoupon');
      if (order.coupon_code && order.discount_percent) {
        couponEl.textContent = `Coupon used: ${order.coupon_code} (${order.discount_percent}% off)`;
        couponEl.style.display = 'block';
      } else {
        couponEl.style.display = 'none';
      }
      resultCard.style.display = 'block';

    } catch (err) {
      console.error('Track order failed:', err);
      lookupError.textContent = 'Something went wrong. Please try again.';
      lookupError.style.display = 'block';
    } finally {
      trackBtn.disabled = false;
      trackBtn.textContent = 'Track order →';
    }
  });
</script>
</body>
</html>
